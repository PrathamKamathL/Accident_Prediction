name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # - name: Run pipeline (Train model)
    #   run: | 
    #     python pipeline/pipeline.py

    - name: Test FastAPI app startup
      run: |
        uvicorn app.app:app --host 127.0.0.1 --port 8000 &
        sleep 5

    - name: Build Docker Image
      run: |
        docker build -t fsml-img .

# Docker runs in port no. 8001
    - name: Run Docker Container
      run: |
        docker run -d -p 8001:8000 fsml-img
        sleep 5

    - name: Check API Docs
      run: |
        curl http://localhost:8001/docs